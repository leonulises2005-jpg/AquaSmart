<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AquaSmart - Sistema Inteligente de Gestión de Agua Potable. Panel de control y monitoreo de consumos.">
    <title>Login - AquaSmart</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💧</text></svg>">
</head>
<body>
    <!-- =====================================================
         PANTALLA DE LOGIN
         ===================================================== -->
    <div class="login-container">
        <div class="login-box">
            <!-- Logo y título -->
            <div class="login-logo">
                <img src="assets/img/logo-aquasmart.png" alt="AquaSmart" style="width:180px; margin-bottom:1rem;">
                <h1>AquaSmart</h1>
                <p>Sistema Inteligente de Gestión de Agua Potable</p>
            </div>

            <!-- Mensaje de error -->
            <div id="loginError" class="login-error"></div>

            <!-- Formulario de login -->
            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" placeholder="admin@aguapotable.com" autocomplete="email" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
            </div>
            <button class="btn btn-primary btn-full" id="btnLogin" onclick="iniciarSesion()">
                Iniciar Sesión
            </button>

            <p style="text-align:center; margin-top:1rem;">
                <a href="#" id="showRegisterLink" onclick="mostrarRegistro(); return false;">¿No tienes cuenta? Regístrate</a>
            </p>

            <div id="registerSection" style="display:none; margin-top:1.5rem;">
                <hr style="margin:1.5rem 0; border-color: rgba(255,255,255,0.1);">
                <h2 style="font-size:1rem; text-align:center; margin-bottom:1rem;">Registrar nueva cuenta</h2>
                <div class="form-group">
                    <label for="registerName">Nombre completo</label>
                    <input type="text" id="registerName" placeholder="Tu nombre" autocomplete="name">
                </div>
                <div class="form-group">
                    <label for="registerEmail">Correo electrónico</label>
                    <input type="email" id="registerEmail" placeholder="correo@ejemplo.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="registerPassword">Contraseña</label>
                    <input type="password" id="registerPassword" placeholder="••••••••" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="registerPasswordConfirm">Confirmar contraseña</label>
                    <input type="password" id="registerPasswordConfirm" placeholder="••••••••" autocomplete="new-password">
                </div>
                <button class="btn btn-secondary btn-full" id="btnRegister" onclick="registrarUsuario()">
                    Registrar usuario
                </button>
                <p style="text-align:center; margin-top:1rem;">
                    <a href="#" onclick="mostrarLogin(); return false;">Volver al login</a>
                </p>
            </div>

            <p style="text-align:center; margin-top:1.5rem; font-size:0.78rem; color:var(--text-light);">
                Demo: admin@aguapotable.com / admin123
            </p>
        </div>
    </div>

    <script>
        // ---- LOGIN ----
        // Permite hacer login con Enter
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') iniciarSesion();
        });
        document.getElementById('email').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') iniciarSesion();
        });

        /**
         * Envía las credenciales al servidor PHP para autenticación
         */
        function iniciarSesion() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');
            const btn = document.getElementById('btnLogin');

            // Validar campos vacíos
            if (!email || !password) {
                errorDiv.textContent = 'Por favor completa todos los campos';
                errorDiv.style.display = 'block';
                return;
            }

            // Deshabilitar botón mientras procesa
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> Verificando...';

            // Enviar datos al backend
            const formData = new FormData();
            formData.append('action', 'login');
            formData.append('email', email);
            formData.append('password', password);

            fetch('php/auth.php', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    errorDiv.textContent = data.mensaje;
                    errorDiv.style.display = 'block';
                } else {
                    // Login exitoso: redirigir al dashboard
                    errorDiv.style.display = 'none';
                    window.location.href = 'dashboard.html';
                }
            })
            .catch(err => {
                errorDiv.textContent = 'Error de conexión. Verifica que el servidor esté activo.';
                errorDiv.style.display = 'block';
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerHTML = 'Iniciar Sesión';
            });
        }

        function mostrarRegistro() {
            document.getElementById('registerSection').style.display = 'block';
            document.getElementById('btnLogin').style.display = 'none';
            document.getElementById('showRegisterLink').style.display = 'none';
            document.getElementById('loginError').textContent = '';
            document.getElementById('loginError').style.display = 'none';
        }

        function mostrarLogin() {
            document.getElementById('registerSection').style.display = 'none';
            document.getElementById('btnLogin').style.display = 'block';
            document.getElementById('showRegisterLink').style.display = 'inline';
            document.getElementById('loginError').textContent = '';
            document.getElementById('loginError').style.display = 'none';
        }

        function registrarUsuario() {
            const nombre = document.getElementById('registerName').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value;
            const passwordConfirm = document.getElementById('registerPasswordConfirm').value;
            const errorDiv = document.getElementById('loginError');
            const btn = document.getElementById('btnRegister');

            if (!nombre || !email || !password || !passwordConfirm) {
                errorDiv.textContent = 'Por favor completa todos los campos para registrarte.';
                errorDiv.style.display = 'block';
                return;
            }

            if (password !== passwordConfirm) {
                errorDiv.textContent = 'Las contraseñas no coinciden.';
                errorDiv.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> Registrando...';

            const formData = new FormData();
            formData.append('action', 'register');
            formData.append('nombre', nombre);
            formData.append('email', email);
            formData.append('password', password);
            formData.append('password_confirm', passwordConfirm);

            fetch('php/auth.php', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                errorDiv.textContent = data.mensaje;
                errorDiv.style.display = 'block';
                if (!data.error) {
                    mostrarLogin();
                    document.getElementById('registerName').value = '';
                    document.getElementById('registerEmail').value = '';
                    document.getElementById('registerPassword').value = '';
                    document.getElementById('registerPasswordConfirm').value = '';
                }
            })
            .catch(err => {
                errorDiv.textContent = 'Error de conexión. Verifica que el servidor esté activo.';
                errorDiv.style.display = 'block';
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerHTML = 'Registrar usuario';
            });
        }
    </script>
</body>
</html>
